<svg width="900" height="680" viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <rect width="900" height="680" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#cdd6f4">Breakout – Aktivitätsdiagramm (Ball-Verhalten)</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#6c7086">UML Verhaltensdiagramm · render()-Methode · INF202</text>
  <line x1="40" y1="58" x2="860" y2="58" stroke="#313244" stroke-width="1"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#a6adc8" stroke-width="1.3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#a6e3a1" stroke-width="1.3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#f38ba8" stroke-width="1.3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#585b70" stroke-width="1.3"/>
    </marker>
  </defs>

  <!-- ═══ START ═══ -->
  <circle cx="450" cy="82" r="14" fill="#cdd6f4"/>
  <line x1="450" y1="96" x2="450" y2="108" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 1: Bildschirm löschen -->
  <rect x="330" y="108" width="240" height="40" rx="20" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="450" y="133" text-anchor="middle" font-size="12" fill="#cdd6f4">Bildschirm löschen</text>
  <line x1="450" y1="148" x2="450" y2="160" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Paddle bewegen -->
  <rect x="305" y="160" width="290" height="40" rx="20" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="450" y="183" text-anchor="middle" font-size="12" fill="#cdd6f4">Paddle bewegen (← / →)</text>
  <line x1="450" y1="200" x2="450" y2="212" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Ball aktualisieren -->
  <rect x="290" y="212" width="320" height="44" rx="22" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="450" y="230" text-anchor="middle" font-size="12" fill="#cdd6f4">Ball-Position aktualisieren</text>
  <text x="450" y="246" text-anchor="middle" font-size="10" fill="#6c7086">x += speedX × delta  |  y += speedY × delta</text>
  <line x1="450" y1="256" x2="450" y2="268" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ DECISION 1: Wand-Kollision ═══ -->
  <polygon points="450,270 514,305 450,340 386,305" fill="#2a2a3e" stroke="#f9e2af" stroke-width="1.8"/>
  <text x="450" y="299" text-anchor="middle" font-size="11" fill="#f9e2af">Wand-Kollision?</text>
  <text x="450" y="313" text-anchor="middle" font-size="9" fill="#6c7086">x&lt;0 | x&gt;800 | y&gt;600</text>
  <!-- YES left -->
  <line x1="386" y1="305" x2="285" y2="305" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="335" y="296" text-anchor="middle" font-size="10" fill="#a6e3a1">Ja</text>
  <rect x="80" y="285" width="205" height="40" rx="8" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.3"/>
  <text x="182" y="304" text-anchor="middle" font-size="11" fill="#a6e3a1">speedX/Y *= -1</text>
  <text x="182" y="317" text-anchor="middle" font-size="9" fill="#6c7086">Richtung umkehren</text>
  <path d="M182 325 L182 355 L444 355" fill="none" stroke="#a6e3a1" stroke-width="1.3"/>
  <!-- NO down -->
  <line x1="450" y1="340" x2="450" y2="355" stroke="#f38ba8" stroke-width="1.3"/>
  <text x="463" y="352" font-size="10" fill="#f38ba8">Nein</text>
  <!-- merge -->
  <circle cx="450" cy="355" r="5" fill="#585b70"/>
  <line x1="450" y1="360" x2="450" y2="372" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ DECISION 2: Paddle-Kollision ═══ -->
  <polygon points="450,375 514,410 450,445 386,410" fill="#2a2a3e" stroke="#f9e2af" stroke-width="1.8"/>
  <text x="450" y="404" text-anchor="middle" font-size="11" fill="#f9e2af">Paddle-Kollision?</text>
  <text x="450" y="418" text-anchor="middle" font-size="9" fill="#6c7086">Ball trifft Paddle</text>
  <!-- YES left -->
  <line x1="386" y1="410" x2="285" y2="410" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="335" y="401" text-anchor="middle" font-size="10" fill="#a6e3a1">Ja</text>
  <rect x="80" y="390" width="205" height="40" rx="8" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.3"/>
  <text x="182" y="409" text-anchor="middle" font-size="11" fill="#a6e3a1">speedY *= -1</text>
  <text x="182" y="422" text-anchor="middle" font-size="9" fill="#6c7086">Ball nach oben sektieren</text>
  <path d="M182 430 L182 460 L444 460" fill="none" stroke="#a6e3a1" stroke-width="1.3"/>
  <!-- NO down -->
  <line x1="450" y1="445" x2="450" y2="460" stroke="#f38ba8" stroke-width="1.3"/>
  <text x="463" y="457" font-size="10" fill="#f38ba8">Nein</text>
  <!-- merge -->
  <circle cx="450" cy="460" r="5" fill="#585b70"/>
  <line x1="450" y1="465" x2="450" y2="477" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ DECISION 3: Brick-Kollision ═══ -->
  <polygon points="450,480 514,515 450,550 386,515" fill="#2a2a3e" stroke="#f9e2af" stroke-width="1.8"/>
  <text x="450" y="509" text-anchor="middle" font-size="11" fill="#f9e2af">Brick-Kollision?</text>
  <text x="450" y="523" text-anchor="middle" font-size="9" fill="#6c7086">isAlive == true</text>
  <!-- YES right -->
  <line x1="514" y1="515" x2="615" y2="515" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="562" y="506" text-anchor="middle" font-size="10" fill="#a6e3a1">Ja</text>
  <rect x="615" y="495" width="210" height="40" rx="8" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.3"/>
  <text x="720" y="513" text-anchor="middle" font-size="11" fill="#a6e3a1">isAlive = false</text>
  <text x="720" y="526" text-anchor="middle" font-size="9" fill="#6c7086">speedY *= -1  |  Brick zerstört</text>
  <path d="M720 535 L720 565 L456 565" fill="none" stroke="#a6e3a1" stroke-width="1.3"/>
  <!-- NO down -->
  <line x1="450" y1="550" x2="450" y2="565" stroke="#f38ba8" stroke-width="1.3"/>
  <text x="463" y="562" font-size="10" fill="#f38ba8">Nein</text>
  <!-- merge -->
  <circle cx="450" cy="565" r="5" fill="#585b70"/>
  <line x1="450" y1="570" x2="450" y2="582" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ DECISION 4: Ball gefallen ═══ -->
  <polygon points="450,585 514,615 450,645 386,615" fill="#2a2a3e" stroke="#f9e2af" stroke-width="1.8"/>
  <text x="450" y="609" text-anchor="middle" font-size="11" fill="#f9e2af">Ball gefallen?</text>
  <text x="450" y="623" text-anchor="middle" font-size="9" fill="#6c7086">y &lt; 0</text>
  <!-- YES right -->
  <line x1="514" y1="615" x2="615" y2="615" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrr)"/>
  <text x="562" y="606" text-anchor="middle" font-size="10" fill="#f38ba8">Ja</text>
  <rect x="615" y="595" width="210" height="44" rx="8" fill="#1e1e2e" stroke="#f38ba8" stroke-width="1.3"/>
  <text x="720" y="613" text-anchor="middle" font-size="11" fill="#f38ba8">Ball zurücksetzen</text>
  <text x="720" y="626" text-anchor="middle" font-size="9" fill="#6c7086">x=400, y=300 | Leben −1</text>
  <path d="M615 617 L580 617 L580 648 L456 648" fill="none" stroke="#f38ba8" stroke-width="1.3"/>
  <!-- NO down -->
  <line x1="450" y1="645" x2="450" y2="648" stroke="#a6adc8" stroke-width="1.3"/>
  <!-- merge -->
  <circle cx="450" cy="648" r="5" fill="#585b70"/>

  <!-- ═══ Loop arrow (nächster Frame) ═══ -->
  <path d="M450 653 L450 665 L855 665 L855 75 L464 75" fill="none" stroke="#585b70" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrd)"/>
  <text x="780" y="658" text-anchor="middle" font-size="10" fill="#585b70">nächster Frame</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="622" y="110" width="240" height="150" rx="8" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="742" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6adc8">Legende</text>
  <line x1="632" y1="140" x2="852" y2="140" stroke="#313244" stroke-width="0.8"/>

  <!-- activity box sample -->
  <rect x="638" y="150" width="60" height="22" rx="11" fill="#313244" stroke="#89b4fa" stroke-width="1.2"/>
  <text x="668" y="165" text-anchor="middle" font-size="9" fill="#89b4fa">Aktion</text>
  <text x="716" y="165" font-size="10" fill="#a6adc8">Aktivität</text>

  <!-- diamond sample -->
  <polygon points="658,192 678,205 658,218 638,205" fill="#2a2a3e" stroke="#f9e2af" stroke-width="1.2"/>
  <text x="658" y="209" text-anchor="middle" font-size="9" fill="#f9e2af">?</text>
  <text x="698" y="210" font-size="10" fill="#a6adc8">Entscheidung</text>

  <!-- YES -->
  <line x1="638" y1="232" x2="668" y2="232" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="716" y="236" font-size="10" fill="#a6adc8">Ja-Zweig</text>

  <!-- NO -->
  <line x1="638" y1="250" x2="668" y2="250" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrr)"/>
  <text x="716" y="254" font-size="10" fill="#a6adc8">Nein-Zweig</text>

  <!-- footer -->
  <text x="450" y="672" text-anchor="middle" font-size="10" fill="#45475a">INF202-Breakout · project_behavior.svg · de.ovgu.cs · Zustand des Balls pro Frame</text>

</svg>
